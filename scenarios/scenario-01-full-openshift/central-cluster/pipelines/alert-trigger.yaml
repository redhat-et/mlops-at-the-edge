apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: alertmanager-binding
  namespace: mlops-pipelines
  labels:
    app.kubernetes.io/part-of: mlops-edge
spec:
  params:
    # AlertManager webhook payload fields
    - name: alert-name
      value: $(body.alerts[0].labels.alertname)
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: model-refresh-template
  namespace: mlops-pipelines
  labels:
    app.kubernetes.io/part-of: mlops-edge
spec:
  params:
    - name: alert-name
      description: Name of the firing alert
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: model-refresh-
        namespace: mlops-pipelines
        labels:
          app.kubernetes.io/part-of: mlops-edge
          tekton.dev/pipeline: model-refresh
      spec:
        pipelineRef:
          name: model-refresh
        params:
          - name: alert-name
            value: $(tt.params.alert-name)
          - name: model-version
            value: "refresh-$(uid)"
        workspaces:
          - name: shared-workspace
            persistentVolumeClaim:
              claimName: pipeline-workspace
          - name: registry-credentials
            secret:
              secretName: registry-credentials
          - name: build-secrets
            secret:
              secretName: hf-token
---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: el-model-refresh
  namespace: mlops-pipelines
  labels:
    app.kubernetes.io/part-of: mlops-edge
spec:
  serviceAccountName: pipeline
  triggers:
    - name: alertmanager-webhook
      bindings:
        - ref: alertmanager-binding
      template:
        ref: model-refresh-template
