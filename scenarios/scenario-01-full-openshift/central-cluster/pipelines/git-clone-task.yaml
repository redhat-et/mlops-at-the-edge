apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: mlops-pipelines
  labels:
    app.kubernetes.io/part-of: mlops-edge
spec:
  description: Clone a git repository into the workspace.
  params:
    - name: url
      description: Repository URL
      type: string
    - name: revision
      description: Branch, tag, or commit SHA to checkout
      type: string
      default: "main"
    - name: deleteExisting
      description: Delete workspace contents before cloning
      type: string
      default: "true"
  workspaces:
    - name: output
      description: Workspace to clone the repository into
  results:
    - name: commit
      description: The commit SHA that was checked out
  steps:
    - name: clone
      image: alpine/git:latest
      env:
        - name: HOME
          value: /tmp/git-home
      script: |
        #!/usr/bin/env sh
        set -eu

        mkdir -p "$HOME"
        git config --global --add safe.directory "$(workspaces.output.path)"

        if [ "$(params.deleteExisting)" = "true" ]; then
          rm -rf "$(workspaces.output.path)/"*
          rm -rf "$(workspaces.output.path)/".[!.]*
        fi

        git clone "$(params.url)" "$(workspaces.output.path)"
        cd "$(workspaces.output.path)"
        git checkout "$(params.revision)"

        COMMIT=$(git rev-parse HEAD)
        echo -n "$COMMIT" > "$(results.commit.path)"
        echo "Cloned $(params.url) at $COMMIT"
