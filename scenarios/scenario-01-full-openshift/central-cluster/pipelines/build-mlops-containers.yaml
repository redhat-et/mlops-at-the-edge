apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-mlops-containers
  namespace: mlops-pipelines
  labels:
    app.kubernetes.io/part-of: mlops-edge
    app.kubernetes.io/component: pipelines
spec:
  description: >-
    Builds all three MLOps container images (modelcar, vllm-server, openwebui)
    and pushes them to Quay.io using OpenShift BuildConfigs.
  params:
    - name: git-url
      description: Git repository URL
      type: string
      default: "https://github.com/redhat-et/mlops-at-the-edge.git"
    - name: git-revision
      description: Git branch or commit SHA to build from
      type: string
      default: "main"
    - name: quay-namespace
      description: Quay.io namespace/org for image push
      type: string
      default: "redhat-et"
    - name: image-tag
      description: Tag for built images (e.g. commit SHA, v1.0.0)
      type: string
      default: "latest"
  workspaces:
    - name: shared-workspace
      description: PVC for cloned source code, shared across tasks
  tasks:
    # Step 1: Clone the git repository
    - name: git-clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
        - name: deleteExisting
          value: "true"
      workspaces:
        - name: output
          workspace: shared-workspace

    # Step 2: Build all three images in parallel
    - name: build-modelcar
      runAfter:
        - git-clone
      taskRef:
        name: build-and-push-image
      params:
        - name: BUILD_CONFIG
          value: build-modelcar
        - name: CONTEXT
          value: "scenarios/containers/modelcar"
        - name: IMAGE_TAG
          value: $(params.image-tag)
        - name: IMAGE_BASE
          value: "quay.io/$(params.quay-namespace)/modelcar-llama-3.2-1b"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: build-vllm-server
      runAfter:
        - git-clone
      taskRef:
        name: build-and-push-image
      params:
        - name: BUILD_CONFIG
          value: build-vllm-server
        - name: CONTEXT
          value: "scenarios/containers/vllm-server"
        - name: IMAGE_TAG
          value: $(params.image-tag)
        - name: IMAGE_BASE
          value: "quay.io/$(params.quay-namespace)/vllm-server"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: build-openwebui
      runAfter:
        - git-clone
      taskRef:
        name: build-and-push-image
      params:
        - name: BUILD_CONFIG
          value: build-openwebui
        - name: CONTEXT
          value: "scenarios/containers/openwebui"
        - name: IMAGE_TAG
          value: $(params.image-tag)
        - name: IMAGE_BASE
          value: "quay.io/$(params.quay-namespace)/openwebui"
      workspaces:
        - name: source
          workspace: shared-workspace
