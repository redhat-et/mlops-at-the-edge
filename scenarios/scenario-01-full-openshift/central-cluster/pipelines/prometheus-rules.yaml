apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mlops-model-health
  namespace: mlops-pipelines
  labels:
    app.kubernetes.io/part-of: mlops-edge
    app.kubernetes.io/component: monitoring
spec:
  groups:
    - name: mlops-model-health
      rules:
        # Alert when vLLM p95 token generation latency exceeds 500ms for 10 minutes
        - alert: VLLMHighLatency
          expr: >-
            histogram_quantile(0.95,
              rate(vllm:time_per_output_token_seconds_bucket[5m])
            ) > 0.5
          for: 10m
          labels:
            severity: warning
            component: vllm
          annotations:
            summary: "vLLM p95 token latency exceeds 500ms"
            description: >-
              The 95th percentile token generation latency has been above 500ms
              for more than 10 minutes. This may indicate model degradation,
              resource contention, or the need for a model refresh.
            runbook: "Consider triggering model-refresh pipeline to rebuild modelcar image."

        # Alert when vLLM error rate exceeds 5% for 5 minutes
        - alert: VLLMHighErrorRate
          expr: >-
            rate(vllm:request_failure_total[5m])
            / rate(vllm:request_success_total[5m])
            > 0.05
          for: 5m
          labels:
            severity: critical
            component: vllm
          annotations:
            summary: "vLLM error rate exceeds 5%"
            description: >-
              The ratio of failed to successful requests has been above 5%
              for more than 5 minutes. This may indicate a corrupt model,
              OOM condition, or inference server instability.

        # Alert when GPU KV cache is consistently near capacity
        - alert: VLLMHighCacheUsage
          expr: vllm:gpu_cache_usage_perc > 0.9
          for: 15m
          labels:
            severity: warning
            component: vllm
          annotations:
            summary: "vLLM GPU KV cache usage above 90%"
            description: >-
              GPU KV cache has been above 90% utilization for 15 minutes.
              This causes request queuing and increased latency. Consider
              using a smaller/quantized model or scaling out.
