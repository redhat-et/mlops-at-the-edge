#cloud-config
# Cloud-init user-data for RHEL 10 bootc EC2 instances
#
# Purpose: EC2 runtime configuration (NVMe storage, SSH keys)
# NOTE: NVIDIA setup (drivers, build tools, CDI) is handled by nvidia-setup.service, NOT cloud-init

# SSH public key for ec2-user
ssh_authorized_keys:
  - <YOUR_SSH_PUBLIC_KEY>

# Disable SSH password authentication for security
ssh_pwauth: false

# Run commands on first boot
runcmd:
  # Mount ephemeral NVMe storage for container storage
  # g5.xlarge instances have local NVMe at /dev/nvme1n1
  - |
    if [ -b /dev/nvme1n1 ]; then
      echo "Found NVMe device /dev/nvme1n1, formatting and mounting..."
      mkfs.xfs -f /dev/nvme1n1
      mount /dev/nvme1n1 /var/lib/containers
      chown -R 1000:1000 /var/lib/containers
      echo "NVMe storage mounted at /var/lib/containers"
    else
      echo "WARNING: NVMe device /dev/nvme1n1 not found, using root volume for container storage"
    fi

  # Wait for nvidia-setup.service to complete before marking cloud-init done
  - |
    echo "Waiting for NVIDIA setup to complete..."
    while ! [ -f /var/lib/nvidia-setup-complete ]; do
      sleep 5
    done
    echo "NVIDIA setup complete, proceeding with cloud-init finalization"

# Output logging
output:
  all: "| tee -a /var/log/cloud-init-output.log"
