apiVersion: flightctl.io/v1beta1
kind: Fleet
metadata:
  name: mlops-gpu-inference
  labels:
    app: mlops
    model: llama-3.2-1b
    hardware: gpu
spec:
  # Select devices with these labels
  selector:
    matchLabels:
      role: gpu-inference
      model: llama-3.2-1b

  # Device template applied to all fleet members
  template:
    metadata:
      labels:
        fleet: mlops-gpu-inference
    spec:
      # OS Image - will be created in next step (bootc image with FlightCtl agent + NVIDIA drivers)
      os:
        image: quay.io/redhat-et/mlops-bootc-rhel10-nvidia:v1.0.0

      # Applications to deploy
      applications:
        - name: mlops-stack
          appType: compose
          # Reference to the OCI image containing podman-compose.yaml
          image: quay.io/redhat-et/mlops-compose:v1.0.0
          # Optional: Override environment variables for the compose deployment
          # envVars:
          #   CUSTOM_VAR: "value"

      # Optional: OS configuration via GitOps
      # config:
      #   - name: mlops-device-config
      #     configType: GitConfigProviderSpec
      #     gitRef:
      #       repository: mlops-gitops-config
      #       targetRevision: main
      #       path: /config/gpu-devices

  # Rollout policy for updates
  rolloutPolicy:
    # Success threshold for batch rollouts
    successThreshold: 95%

    # Device selection strategy for gradual rollout
    deviceSelection:
      strategy: BatchSequence
      sequence:
        # First: Update 1 canary device
        - selector:
            matchLabels:
              stage: canary
          limit: 1
        # Then: Update 10% of production devices
        - limit: 10%
        # Finally: Update remaining devices (implicit batch)

    # Optional: Disruption budget to maintain minimum availability
    # disruptionBudget:
    #   groupBy: ["site"]
    #   minAvailable: 1
