apiVersion: flightctl.io/v1beta1
kind: Fleet
metadata:
  name: mlops
spec:
  selector:
    matchLabels:
      project: mlops
  template:
    metadata:
      labels:
        fleet: mlops
    spec:
      applications:
        - name: mlops-gpu-stack
          appType: quadlet
          inline:
            - path: model-storage.volume
              content: |
                [Volume]
                # Shared volume for model files from model-car init container
            - path: openwebui-data.volume
              content: |
                [Volume]
                # Local volume for OpenWebUI persistent data
            - path: mlops.network
              content: |
                [Network]
                # Bridge network for container communication
            - path: model-car.container
              content: |
                [Unit]
                Description=Model Car Init Container
                Before=vllm-server.service

                [Container]
                Image=quay.io/redhat-et/modelcar-llama-3.2-1b:v1.0.0
                Volume=model-storage.volume:/target:Z
                PodmanArgs=--user=0
                Exec=sh -c "cp -r /models/* /target/"

                [Service]
                Type=oneshot
                RemainAfterExit=yes

                [Install]
                WantedBy=multi-user.target default.target
            - path: vllm-server.container
              content: |
                [Unit]
                Description=vLLM GPU Inference Server
                After=network-online.target model-car.service

                [Container]
                Image=quay.io/redhat-et/vllm-server:latest
                Volume=model-storage.volume:/models:ro,z
                PublishPort=8000:8000
                AddDevice=nvidia.com/gpu=all
                PodmanArgs=--shm-size=2g --network-alias=vllm-server
                Environment=LD_LIBRARY_PATH=/usr/lib64
                Exec=vllm serve /models --served-model-name Llama-3.2-1B-Instruct
                Network=mlops.network
                HealthCmd=curl -f http://localhost:8000/health || exit 1
                HealthInterval=30s
                HealthTimeout=10s
                HealthRetries=3
                HealthStartPeriod=90s

                [Service]
                Restart=always
                RestartSec=10

                [Install]
                WantedBy=multi-user.target default.target
            - path: vllm-bench.container
              content: |
                [Unit]
                Description=vLLM Benchmark Load Generator
                After=vllm-server.service

                [Container]
                Image=quay.io/redhat-et/vllm-server:latest
                Volume=model-storage.volume:/models:ro,z
                Network=mlops.network
                Exec=sh -c "sleep 120 && vllm bench serve --base-url http://vllm-server:8000 --model Llama-3.2-1B-Instruct --tokenizer /models --request-rate 3.0"

                [Service]
                Type=oneshot

                [Install]
                WantedBy=multi-user.target default.target
            - path: openwebui.container
              content: |
                [Unit]
                Description=OpenWebUI Chat Frontend
                After=network-online.target vllm-server.service
                Requires=vllm-server.service

                [Container]
                Image=quay.io/redhat-et/openwebui:latest
                Volume=openwebui-data.volume:/app/backend/data:Z
                Network=host
                Environment=OPENAI_API_BASE_URL=http://localhost:8000/v1
                HealthCmd=curl -f http://localhost:8080/health || exit 1
                HealthInterval=30s
                HealthTimeout=10s
                HealthRetries=3
                HealthStartPeriod=20s

                [Service]
                Restart=always
                RestartSec=10

                [Install]
                WantedBy=multi-user.target default.target
