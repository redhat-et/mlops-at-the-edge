# Shaun- FlightCtl Fleet definition for MLOps GPU inference stack (model-car + vLLM + OpenWebUI)
# Key changes applied:
# 1. Changed inline compose syntax from "image: inline" with direct YAML to proper "inline" array with "path" and "content" fields
# 2. Removed all "container_name" fields - FlightCtl doesn't support hardcoded container names
# 3. Devices must be labeled with "project: mlops" to match the fleet selector below
# 4. SELinux fix: Use :z (shared) instead of :Z (private) on shared volumes, removed label=disable
#    Requires: setsebool -P container_use_devices 1 on the host (baked into bootc image)
apiVersion: flightctl.io/v1beta1
kind: Fleet
metadata:
  name: mlops
spec:
  selector:
    matchLabels:
      project: mlops  # Shaun- Devices need this label to join the fleet
  template:
    metadata:
      labels:
        fleet: mlops
    spec:
      applications:
        - name: mlops-gpu-stack
          appType: compose
          # Shaun- inline compose syntax: array with path and content fields
          inline:
            - path: podman-compose.yaml
              content: |
                version: "3.8"
                services:
                  model-car:
                    image: quay.io/redhat-et/modelcar-llama-3.2-1b:v1.0.0
                    command: ["sleep", "infinity"]
                    volumes:
                      - model-storage:/models:z  # Shaun- lowercase :z = shared SELinux label (multiple containers access this volume)
                    restart: always
                    networks:
                      - mlops-network

                  vllm-server:
                    image: quay.io/redhat-et/vllm-server:latest
                    depends_on:
                      - model-car
                    volumes:
                      - model-storage:/models:ro,z  # Shaun- lowercase :z for shared access, :ro for read-only
                    ports:
                      - "8000:8000"
                    # Shaun- Critical GPU configuration flags (two required):
                    devices:
                      - nvidia.com/gpu=all  # GPU passthrough via CDI
                    shm_size: 2g  # Prevents "Bus error" - vLLM needs shared memory for tensor operations
                    # Shaun- SELinux stays enforced. GPU device access enabled via container_use_devices boolean on host.
                    environment:
                      - LD_LIBRARY_PATH=/usr/lib64  # Forces vLLM to use host CUDA 13.1 libs instead of bundled 12.4
                    restart: always
                    networks:
                      - mlops-network
                    healthcheck:
                      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
                      interval: 30s
                      timeout: 10s
                      retries: 3
                      start_period: 90s

                  openwebui:
                    image: quay.io/redhat-et/openwebui:latest
                    depends_on:
                      - vllm-server
                    volumes:
                      - openwebui-data:/app/backend/data:Z
                    network_mode: host  # Shaun- Uses host network to access vLLM on localhost:8000, OpenWebUI runs on port 8080
                    environment:
                      - OPENAI_API_BASE_URL=http://localhost:8000/v1
                    restart: always
                    healthcheck:
                      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
                      interval: 30s
                      timeout: 10s
                      retries: 3
                      start_period: 20s

                volumes:
                  model-storage:
                    driver: local
                  openwebui-data:
                    driver: local

                networks:
                  mlops-network:
                    driver: bridge
