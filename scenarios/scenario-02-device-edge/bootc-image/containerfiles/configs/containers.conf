# Podman Configuration for MLOps GPU Workloads
#
# This configuration is baked into the bootc OS image and provides
# the necessary capabilities for running GPU-accelerated containers.
#

[containers]
# Default capabilities for containers
# These are required for vLLM and other ML inference workloads
default_capabilities = [
  "CHOWN",
  "DAC_OVERRIDE",
  "FOWNER",
  "FSETID",
  "KILL",
  "NET_BIND_SERVICE",
  "SETFCAP",
  "SETGID",
  "SETPCAP",
  "SETUID",
  "SYS_CHROOT"
]
