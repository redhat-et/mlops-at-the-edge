# PIPELINE DEFINITION
# Name: mlops-inner-loop
# Description: Inner loop: respond to edge alert by retraining and triggering outer loop deployment.
# Inputs:
#    alert_name: str [Default: 'VLLMHighLatency']
#    device_id: str [Default: 'unknown']
#    flightctl_url: str
#    github_token: str
#    severity: str [Default: 'warning']
components:
  comp-log-alert:
    executorLabel: exec-log-alert
    inputDefinitions:
      parameters:
        alert_name:
          parameterType: STRING
        device_id:
          parameterType: STRING
        severity:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-register-model:
    executorLabel: exec-register-model
    inputDefinitions:
      parameters:
        model_version:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-simulate-retraining:
    executorLabel: exec-simulate-retraining
    inputDefinitions:
      parameters:
        trigger_context:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-trigger-outer-loop:
    executorLabel: exec-trigger-outer-loop
    inputDefinitions:
      parameters:
        flightctl_url:
          parameterType: STRING
        github_token:
          parameterType: STRING
        model_version:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-log-alert:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - log_alert
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef log_alert(alert_name: str, severity: str, device_id: str) ->\
          \ str:\n    \"\"\"Log the incoming alert context that triggered this pipeline\
          \ run.\"\"\"\n    print(\"=\" * 60)\n    print(\"ALERT RECEIVED\")\n   \
          \ print(\"=\" * 60)\n    print(f\"  Alert:    {alert_name}\")\n    print(f\"\
          \  Severity: {severity}\")\n    print(f\"  Device:   {device_id}\")\n  \
          \  print(\"=\" * 60)\n\n    context = f\"alert={alert_name} severity={severity}\
          \ device={device_id}\"\n    print(f\"Trigger context: {context}\")\n   \
          \ return context\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
    exec-register-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - register_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef register_model(model_version: str) -> str:\n    \"\"\"Mock model\
          \ registration (log only, no registry API calls).\"\"\"\n    model_name\
          \ = \"llama-3.2-1b\"\n    artifact_uri = f\"quay.io/redhat-et/modelcar-{model_name}:{model_version}\"\
          \n\n    print(\"=\" * 60)\n    print(\"MODEL REGISTRATION (mock)\")\n  \
          \  print(\"=\" * 60)\n    print(f\"  Model:    {model_name}\")\n    print(f\"\
          \  Version:  {model_version}\")\n    print(f\"  Artifact: {artifact_uri}\"\
          )\n    print(f\"  Status:   REGISTERED\")\n    print(\"=\" * 60)\n\n   \
          \ return model_version\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
    exec-simulate-retraining:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - simulate_retraining
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef simulate_retraining(trigger_context: str) -> str:\n    \"\"\"\
          Simulate model retraining with fake training loop.\n\n    Runs 5 epochs\
          \ with decreasing loss and increasing accuracy.\n    Generates a version\
          \ tag based on today's date.\n    \"\"\"\n    import time\n    from datetime\
          \ import datetime, timezone\n\n    print(f\"Starting retraining triggered\
          \ by: {trigger_context}\")\n    print(\"-\" * 60)\n\n    # Simulate 5 training\
          \ epochs\n    for epoch in range(1, 6):\n        loss = 2.5 / (epoch + 0.5)\n\
          \        accuracy = min(0.60 + epoch * 0.07, 0.95)\n        print(f\"Epoch\
          \ {epoch}/5 - loss: {loss:.4f} - accuracy: {accuracy:.4f}\")\n        time.sleep(5)\n\
          \n    version = \"v1.0.\" + datetime.now(timezone.utc).strftime(\"%Y%m%d%H%M\"\
          )\n    print(\"-\" * 60)\n    print(f\"Training complete. Model version:\
          \ {version}\")\n    return version\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
    exec-trigger-outer-loop:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - trigger_outer_loop
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'requests'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef trigger_outer_loop(model_version: str, github_token: str, flightctl_url:\
          \ str) -> str:\n    \"\"\"Trigger the GitHub Actions model-refresh-build\
          \ workflow via workflow_dispatch.\"\"\"\n    import requests\n\n    repo\
          \ = \"redhat-et/mlops-at-the-edge\"\n    workflow = \"model-refresh-build.yaml\"\
          \n    url = f\"https://api.github.com/repos/{repo}/actions/workflows/{workflow}/dispatches\"\
          \n\n    payload = {\n        \"ref\": \"extend-github-actions\",\n     \
          \   \"inputs\": {\n            \"model_version\": model_version,\n     \
          \       \"trigger\": \"kfp-inner-loop\",\n            \"flightctl_url\"\
          : flightctl_url,\n        },\n    }\n\n    headers = {\n        \"Accept\"\
          : \"application/vnd.github.v3+json\",\n        \"Authorization\": f\"Bearer\
          \ {github_token}\",\n    }\n\n    print(f\"Triggering outer loop: {url}\"\
          )\n    print(f\"  ref: main\")\n    print(f\"  model_version: {model_version}\"\
          )\n    print(f\"  flightctl_url: {flightctl_url}\")\n\n    resp = requests.post(url,\
          \ json=payload, headers=headers, timeout=30)\n\n    if resp.status_code\
          \ == 204:\n        print(\"Outer loop triggered successfully (HTTP 204)\"\
          )\n        return f\"triggered:{model_version}\"\n    else:\n        msg\
          \ = f\"Failed to trigger outer loop: HTTP {resp.status_code} - {resp.text}\"\
          \n        print(msg)\n        raise RuntimeError(msg)\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
pipelineInfo:
  description: 'Inner loop: respond to edge alert by retraining and triggering outer
    loop deployment.'
  name: mlops-inner-loop
root:
  dag:
    tasks:
      log-alert:
        cachingOptions: {}
        componentRef:
          name: comp-log-alert
        inputs:
          parameters:
            alert_name:
              componentInputParameter: alert_name
            device_id:
              componentInputParameter: device_id
            severity:
              componentInputParameter: severity
        taskInfo:
          name: log-alert
      register-model:
        cachingOptions: {}
        componentRef:
          name: comp-register-model
        dependentTasks:
        - simulate-retraining
        inputs:
          parameters:
            model_version:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: simulate-retraining
        taskInfo:
          name: register-model
      simulate-retraining:
        cachingOptions: {}
        componentRef:
          name: comp-simulate-retraining
        dependentTasks:
        - log-alert
        inputs:
          parameters:
            trigger_context:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: log-alert
        taskInfo:
          name: simulate-retraining
      trigger-outer-loop:
        cachingOptions: {}
        componentRef:
          name: comp-trigger-outer-loop
        dependentTasks:
        - register-model
        inputs:
          parameters:
            flightctl_url:
              componentInputParameter: flightctl_url
            github_token:
              componentInputParameter: github_token
            model_version:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: register-model
        taskInfo:
          name: trigger-outer-loop
  inputDefinitions:
    parameters:
      alert_name:
        defaultValue: VLLMHighLatency
        isOptional: true
        parameterType: STRING
      device_id:
        defaultValue: unknown
        isOptional: true
        parameterType: STRING
      flightctl_url:
        parameterType: STRING
      github_token:
        parameterType: STRING
      severity:
        defaultValue: warning
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
